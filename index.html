<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Machine Linux</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(160, 90, 250, 0.1) 0%, transparent 100%);
            z-index: -1;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #0f0f0f;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(160, 90, 250, 0.3);
        }

        h1 {
            font-size: 2.5rem;
            text-align: center;
            color: #a05afa;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }

        /* Галерея */
        .gallery {
            margin: 30px 0;
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .env-name {
            font-size: 1.5rem;
            color: #a05afa;
            transition: opacity 0.3s ease;
            display: inline-block;
        }

        .env-name.fade {
            opacity: 0;
        }

        .gallery-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .gallery-image {
            flex: 1;
            min-width: 300px;
            text-align: center;
        }

        .gallery-image img {
            max-width: 100%;
            border-radius: 10px;
            border: 2px solid rgba(160, 90, 250, 0.5);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .gallery-image img.fade {
            opacity: 0;
        }

        .gallery-nav {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            background: transparent;
            border: 2px solid #a05afa;
            color: #a05afa;
            font-size: 2rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            background: #a05afa;
            color: #0a0a0a;
            transform: scale(1.1);
        }

        .dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #333;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dot.active {
            background: #a05afa;
            transform: scale(1.2);
        }

        /* Кнопка скачивания */
        .download-section {
            text-align: center;
            margin: 30px 0;
        }

        .download-btn {
            display: inline-block;
            background: #a05afa;
            color: #0a0a0a;
            font-weight: bold;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .download-btn:hover {
            background: #8a3be8;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(160, 90, 250, 0.4);
        }

        /* Changelog */
        .changelog-section h2 {
            color: #a05afa;
            margin-bottom: 15px;
            border-bottom: 2px solid #a05afa;
            display: inline-block;
            padding-bottom: 5px;
        }

        .changelog-list {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            list-style: none;
            margin-top: 15px;
        }

        .changelog-list li {
            padding: 8px 0;
            border-bottom: 1px solid #2a2a2a;
        }

        .changelog-list li:last-child {
            border-bottom: none;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #2a2a2a;
            font-size: 0.8rem;
            color: #666;
        }

        a {
            color: #a05afa;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🌍 World Machine Linux</h1>
    <div class="subtitle">Операционная система, вдохновлённая игрой OneShot: World Machine Edition</div>

    <!-- Галерея -->
    <div class="gallery">
        <div class="gallery-header">
            <div class="env-name" id="env-name">Hyprland by maxobur0001</div>
        </div>
        <div class="gallery-container">
            <button class="nav-btn" id="prev-btn">‹</button>
            <div class="gallery-image">
                <img id="gallery-img" src="https://i.postimg.cc/KRqvMRtf/hyprland.png" alt="Hyprland">
            </div>
            <button class="nav-btn" id="next-btn">›</button>
        </div>
        <div class="dots" id="dots"></div>
    </div>

    <!-- Скачивание -->
    <div class="download-section">
        <a href="https://mega.nz/file/D4Q1jIDZ#DWRuO-sgLgP6SCurZN2a5jVjwKspQ4XsB27_ZR9KTqI" class="download-btn">📥 Скачать WMOS (Mega)</a>
    </div>

    <!-- Changelog -->
    <div class="changelog-section">
        <h2>История изменений</h2>
        <div class="changelog-list" id="changelog">Загрузка...</div>
    </div>

    <div class="footer">
        <p>World Machine Linux — свободная операционная система</p>
        <p>Built with ❤️ by capYT</p>
    </div>
</div>

<script>
    // Данные для галереи
    const environments = [
        {
            name: "Hyprland by maxobur0001",
            image: "https://i.postimg.cc/KRqvMRtf/hyprland.png"
        },
        {
            name: "KDE Plasma by capYT",
            image: "https://i.postimg.cc/1fC5qfDC/kde.png"
        }
    ];

    let currentIndex = 0;
    const envNameEl = document.getElementById('env-name');
    const galleryImg = document.getElementById('gallery-img');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const dotsContainer = document.getElementById('dots');

    // Создаём точки
    function createDots() {
        dotsContainer.innerHTML = '';
        environments.forEach((_, index) => {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            if (index === currentIndex) dot.classList.add('active');
            dot.addEventListener('click', () => switchToIndex(index));
            dotsContainer.appendChild(dot);
        });
    }

    function updateDots() {
        const dots = document.querySelectorAll('.dot');
        dots.forEach((dot, index) => {
            if (index === currentIndex) {
                dot.classList.add('active');
            } else {
                dot.classList.remove('active');
            }
        });
    }

    function switchToIndex(newIndex) {
        if (newIndex === currentIndex) return;
        
        // Плавное затухание
        envNameEl.classList.add('fade');
        galleryImg.classList.add('fade');
        
        setTimeout(() => {
            currentIndex = newIndex;
            envNameEl.textContent = environments[currentIndex].name;
            galleryImg.src = environments[currentIndex].image;
            
            setTimeout(() => {
                envNameEl.classList.remove('fade');
                galleryImg.classList.remove('fade');
            }, 50);
            updateDots();
        }, 200);
    }

    function nextImage() {
        const newIndex = (currentIndex + 1) % environments.length;
        switchToIndex(newIndex);
    }

    function prevImage() {
        const newIndex = (currentIndex - 1 + environments.length) % environments.length;
        switchToIndex(newIndex);
    }

    prevBtn.addEventListener('click', prevImage);
    nextBtn.addEventListener('click', nextImage);
    
    createDots();

    // Загрузка changelog из version.json
    fetch('version.json')
        .then(res => res.json())
        .then(data => {
            const changelogDiv = document.getElementById('changelog');
            let html = `<strong>Версия ${data.version}</strong><br><br>`;
            data.changelog.forEach(item => {
                html += `<li>${item}</li>`;
            });
            changelogDiv.innerHTML = `<ul class="changelog-list">${html}</ul>`;
        })
        .catch(() => {
            document.getElementById('changelog').innerHTML = '<ul class="changelog-list"><li>Не удалось загрузить историю изменений</li></ul>';
        });
</script>
</body>
</html>
